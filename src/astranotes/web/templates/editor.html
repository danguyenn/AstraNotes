{% extends "base.html" %}
{% block title %}{{ 'Edit note' if note else 'New note' }} · AstraNotes{% endblock %}
{% block content %}
<form class="editor" method="post"
      action="{{ url_for('notes.update', note_id=note.note_id) if note else url_for('notes.create') }}"
      data-dirty-guard>
  <div class="editor-head">
    <input class="title-input" type="text" name="title" placeholder="Note title"
           value="{{ note.title if note else '' }}" autofocus aria-label="Note title">
    <button class="btn btn-primary" type="submit">Save</button>
  </div>

  <div class="editor-meta">
    <label>Folder
      <select name="folder_id">
        <option value="">Uncategorized</option>
        {% for folder in folders %}
        <option value="{{ folder.folder_id }}" {{ 'selected' if note and note.folder_id == folder.folder_id else '' }}>{{ folder.name }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Tags
      <input type="text" name="tags" placeholder="comma, separated" value="{{ note.tags | join(', ') if note else '' }}">
    </label>
  </div>

  <div class="editor-panes">
    <textarea class="md-input" name="content" placeholder="Write Markdown here…" aria-label="Note content">{{ content }}</textarea>
    <div class="md-preview" id="preview" aria-live="polite"></div>
  </div>
</form>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='preview.js') }}"></script>
{% endblock %}
