name: CI

# Bounded triggers: only on pushes and pull requests to main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Quality gates run before tests so a lint/type failure surfaces fast.
      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Mypy
        run: mypy src

      - name: Run tests
        run: pytest --cov=astranotes --cov-report=term-missing

  # Validates the pinned requirements.lock — the reproducible set the Dockerfile
  # installs. The range-resolved install in `test` would not catch lock drift, so
  # this job mirrors the Dockerfile's pinned install and runs the suite against it.
  locked-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned runtime set + package (mirrors Dockerfile)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install --no-deps .

      - name: Run tests against the pinned set
        run: |
          pip install pytest pytest-cov
          pytest
